project:
  type: book
  output-dir: _book

book:
  title: "The World Economy over the Very Long Run"
  subtitle: "A History in Data and Debates"
  author: "Ronan Lyons"
  date: today
  cover-image: images/cover-dhow.jpg
  search: true
  downloads: [pdf]
  sidebar:
    style: docked
  chapters:
    - index.qmd
    - 00-introduction.qmd
    - part: "A — A world without a centre"
      chapters:
        - 01-deep-structures.qmd
        - 02-first-world-system.qmd
    - part: "B — The ocean at its height"
      chapters:
        - 03-maritime-apogee.qmd
        - 04-high-medieval-mongol.qmd
    - part: "C — The world becomes one — and stays Asian"
      chapters:
        - 05-world-becomes-one.qmd
        - 06-companies-coercion.qmd
    - part: "D — The great reversal"
      chapters:
        - 07-great-divergence.qmd
        - 08-first-global-economy.qmd
    - part: "E — Break and return"
      chapters:
        - 09-disintegration.qmd
        - 10-asian-rebalancing.qmd
    - 11-conclusion.qmd
  appendices:
    - appendix-a-datasets.qmd
    - appendix-b-sources.qmd
    - appendix-c-ledger.qmd
    - references.qmd

bibliography: references.bib
# csl: re-enable once references.bib is populated (Phase 3); default style until then.

format:
  html:
    theme:
      - cosmo
      - style/world-economy.scss
    toc: true
    toc-title: "On this page"
    number-sections: true
    number-depth: 1            # number chapters only, not the within-chapter sections
    lightbox: auto             # all figures (graphs + photos) enlarge on click
    reference-location: margin   # source endnotes set in the right margin (Tufte-style)
    linestretch: 1.62
    grid:
      sidebar-width: 270px
      body-width: 760px
      margin-width: 340px
      gutter-width: 1.6rem
  pdf:
    documentclass: scrbook
    papersize: a4
    geometry:           # explicit ~symmetric margins -> text block ~80% of page width
      - inner=22mm      # (KOMA's DIV keeps a lopsided 1:2 inner:outer ratio; geometry overrides it)
      - outer=20mm
      - top=24mm
      - bottom=26mm
    number-sections: true   # number the 10 chapters so @sec-chNN cross-refs resolve ("Chapter 2")
    number-depth: 1         # number chapters only, not the within-chapter ## sections
    fig-pos: 'H'      # pin figures where written (needs float pkg) -> no overlap, no float-only pages
    pdf-engine: xelatex
    mainfont: "TeX Gyre Pagella"   # Palatino-like book serif; ships with TinyTeX (reproducible)
    sansfont: "TeX Gyre Heros"
    include-in-header:
      - tex/unicode-map.tex
      - tex/pdf-layout.tex
      - tex/cover-page.tex

# Open-access: licensed CC BY (confirm before first public render).
license: "CC BY"
